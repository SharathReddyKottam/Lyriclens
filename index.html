<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LyricLens</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0c;
    --surface: #111116;
    --surface2: #18181f;
    --border: rgba(255,255,255,0.06);
    --accent: #c8a96e;
    --accent2: #7c6aff;
    --text: #e8e4dc;
    --text-muted: #6b6870;
    --text-dim: #3a383e;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Crimson Pro', Georgia, serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.4;
  }

  body::after {
    content: '';
    position: fixed;
    top: -30%;
    left: 50%;
    transform: translateX(-50%);
    width: 60vw; height: 60vw;
    background: radial-gradient(ellipse, rgba(124,106,255,0.04) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .app { max-width: 820px; margin: 0 auto; padding: 48px 24px 80px; position: relative; z-index: 1; }

  header {
    display: flex; align-items: baseline; gap: 12px;
    margin-bottom: 56px; border-bottom: 1px solid var(--border); padding-bottom: 24px;
  }
  .logo { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
  .logo span { color: var(--accent); }
  .tagline { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-muted); letter-spacing: 0.08em; text-transform: uppercase; }

  .song-section { margin-bottom: 40px; }
  .label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px; }
  .input-row { display: flex; gap: 10px; }

  input[type="text"] {
    flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 4px;
    color: var(--text); font-family: 'Crimson Pro', serif; font-size: 18px; padding: 14px 18px;
    outline: none; transition: border-color 0.2s, box-shadow 0.2s;
  }
  input[type="text"]::placeholder { color: var(--text-dim); }
  input[type="text"]:focus { border-color: rgba(200,169,110,0.4); box-shadow: 0 0 0 3px rgba(200,169,110,0.06); }

  button {
    background: var(--accent); border: none; border-radius: 4px; color: #0a0a0c; cursor: pointer;
    font-family: 'DM Mono', monospace; font-size: 12px; letter-spacing: 0.08em; padding: 14px 22px;
    text-transform: uppercase; transition: opacity 0.2s, transform 0.1s; white-space: nowrap;
  }
  button:hover { opacity: 0.85; }
  button:active { transform: scale(0.98); }
  button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .btn-secondary { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); }

  .now-playing {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    padding: 24px; margin-bottom: 32px; display: none; position: relative; overflow: hidden;
  }
  .now-playing.visible { display: block; }
  .now-playing::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent); opacity: 0.5;
  }
  .np-meta { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; }
  .np-dot { width: 8px; height: 8px; background: #1db954; border-radius: 50%; animation: pulse 2s infinite; flex-shrink: 0; }
  @keyframes pulse { 0%,100% { opacity: 1; box-shadow: 0 0 0 0 rgba(29,185,84,0.4); } 50% { opacity: 0.7; box-shadow: 0 0 0 6px rgba(29,185,84,0); } }
  .np-info { flex: 1; }
  .np-title { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; line-height: 1.2; }
  .np-artist { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-muted); margin-top: 4px; letter-spacing: 0.06em; }

  .spotify-embed { border-radius: 6px; overflow: hidden; display: none; }
  .spotify-embed.visible { display: block; }
  .spotify-embed iframe { width: 100%; border: none; border-radius: 6px; }

  .status { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text-muted); padding: 16px 0; display: none; letter-spacing: 0.04em; }
  .status.visible { display: flex; align-items: center; gap: 10px; }
  .spinner { width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .lyrics-section { display: none; }
  .lyrics-section.visible { display: block; }
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
  .section-title { font-family: 'Playfair Display', serif; font-size: 13px; font-style: italic; color: var(--text-muted); letter-spacing: 0.04em; }

  .lyric-line { border-bottom: 1px solid var(--border); padding: 20px 0; cursor: pointer; transition: background 0.2s; border-radius: 4px; position: relative; }
  .lyric-line:hover { background: rgba(255,255,255,0.02); padding-left: 12px; padding-right: 12px; margin-left: -12px; margin-right: -12px; }
  .lyric-text { font-size: 20px; font-weight: 300; line-height: 1.5; color: var(--text); font-style: italic; transition: color 0.2s; }
  .lyric-line:hover .lyric-text { color: var(--accent); }
  .lyric-hint { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-dim); margin-top: 6px; letter-spacing: 0.08em; text-transform: uppercase; transition: color 0.2s; }
  .lyric-line:hover .lyric-hint { color: var(--text-muted); }

  .meaning-panel { background: var(--surface2); border: 1px solid var(--border); border-left: 2px solid var(--accent); border-radius: 0 6px 6px 0; padding: 16px 20px; margin-top: 12px; display: none; animation: slideDown 0.25s ease; }
  .meaning-panel.visible { display: block; }
  @keyframes slideDown { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
  .meaning-loading { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-muted); display: flex; align-items: center; gap: 8px; }
  .meaning-text { font-size: 16px; line-height: 1.7; color: #b8b4ac; font-weight: 300; }
  .meaning-translation { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--accent); letter-spacing: 0.06em; margin-bottom: 8px; }

  .error-msg { background: rgba(255,80,80,0.06); border: 1px solid rgba(255,80,80,0.15); color: #ff8080; font-family: 'DM Mono', monospace; font-size: 12px; padding: 12px 16px; margin: 16px 0; display: none; border-radius: 4px; }
  .error-msg.visible { display: block; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--text-dim); border-radius: 2px; }

  @media (max-width: 600px) {
    .app { padding: 32px 16px 60px; }
    .logo { font-size: 22px; }
    .input-row { flex-direction: column; }
    .lyric-text { font-size: 17px; }
  }
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="logo">Lyric<span>Lens</span></div>
    <div class="tagline">AI-powered lyric meanings</div>
  </header>

  <div class="song-section">
    <div class="label">Song & Artist</div>
    <div class="input-row">
      <input type="text" id="songInput" placeholder="e.g. Tere Naina — Shankar-Ehsaan-Loy" />
      <button onclick="fetchLyrics()" id="analyzeBtn">Analyze</button>
    </div>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <div class="now-playing" id="nowPlaying">
    <div class="np-meta">
      <div class="np-dot"></div>
      <div class="np-info">
        <div class="np-title" id="npTitle">—</div>
        <div class="np-artist" id="npArtist">—</div>
      </div>
    </div>
    <div class="spotify-embed" id="spotifyEmbed">
      <iframe id="spotifyIframe" height="80" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
    </div>
  </div>

  <div class="status" id="status">
    <div class="spinner"></div>
    <span id="statusText">Loading...</span>
  </div>

  <div class="lyrics-section" id="lyricsSection">
    <div class="section-header">
      <div class="section-title">Click any line to reveal its meaning</div>
    </div>
    <div id="lyricsContainer"></div>
  </div>

</div>

<script>
  let currentSong = '';
  let currentArtist = '';
  const meaningCache = {};

  function showStatus(t) { document.getElementById('status').classList.add('visible'); document.getElementById('statusText').textContent = t; }
  function hideStatus() { document.getElementById('status').classList.remove('visible'); }
  function showError(m) { const e = document.getElementById('errorMsg'); e.textContent = m; e.classList.add('visible'); }
  function hideError() { document.getElementById('errorMsg').classList.remove('visible'); }

  function showNowPlaying(title, artist) {
    document.getElementById('npTitle').textContent = title;
    document.getElementById('npArtist').textContent = artist || '—';
    document.getElementById('nowPlaying').classList.add('visible');
  }

  async function fetchLyrics() {
    hideError();
    const input = document.getElementById('songInput').value.trim();
    if (!input) { showError('Please enter a song name.'); return; }

    let title = input, artist = '';
    if (input.includes('—')) { [title, artist] = input.split('—').map(s => s.trim()); }
    else if (input.toLowerCase().includes(' by ')) {
      const idx = input.toLowerCase().lastIndexOf(' by ');
      title = input.slice(0, idx).trim();
      artist = input.slice(idx + 4).trim();
    }

    currentSong = title; currentArtist = artist;
    document.getElementById('lyricsSection').classList.remove('visible');
    document.getElementById('lyricsContainer').innerHTML = '';
    document.getElementById('analyzeBtn').disabled = true;
    showStatus(`Fetching lyrics for "${title}"...`);

    try {
      const res = await fetch('/api/lyrics', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, artist })
      });
      const data = await res.json();
      document.getElementById('analyzeBtn').disabled = false;

      if (data.error) { hideStatus(); showError(data.error); return; }
      const lines = data.lines || [];
      if (!lines.length) { hideStatus(); showError(`Lyrics not found for "${title}". Try adding the artist name.`); return; }

      hideStatus();
      renderLyrics(lines);
      showNowPlaying(title, artist);
    } catch {
      document.getElementById('analyzeBtn').disabled = false;
      hideStatus(); showError('Something went wrong. Please try again.');
    }
  }

  function renderLyrics(lines) {
    const c = document.getElementById('lyricsContainer');
    c.innerHTML = '';
    lines.forEach((line, i) => {
      if (!line.trim()) return;
      const div = document.createElement('div');
      div.className = 'lyric-line';
      div.innerHTML = `
        <div class="lyric-text">${escapeHtml(line)}</div>
        <div class="lyric-hint">tap to reveal meaning</div>
        <div class="meaning-panel" id="meaning-${i}"></div>`;
      div.addEventListener('click', () => revealMeaning(i, line, div));
      c.appendChild(div);
    });
    document.getElementById('lyricsSection').classList.add('visible');
    document.getElementById('lyricsSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  async function revealMeaning(idx, line, div) {
    const panel = document.getElementById(`meaning-${idx}`);
    const hint = div.querySelector('.lyric-hint');

    if (panel.classList.contains('visible')) {
      panel.classList.remove('visible');
      hint.textContent = 'tap to reveal meaning';
      return;
    }
    panel.classList.add('visible');
    hint.textContent = 'interpreting...';

    if (meaningCache[idx]) { panel.innerHTML = formatMeaning(meaningCache[idx]); hint.textContent = 'click to hide'; return; }

    panel.innerHTML = `<div class="meaning-loading"><div class="spinner"></div> Interpreting line...</div>`;

    try {
      const res = await fetch('/api/meaning', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ line, song: currentSong, artist: currentArtist })
      });
      const result = await res.json();
      meaningCache[idx] = result;
      panel.innerHTML = formatMeaning(result);
      hint.textContent = 'click to hide';
    } catch {
      panel.innerHTML = `<div class="meaning-text" style="color:#ff8080;">Could not load meaning. Try again.</div>`;
      hint.textContent = 'tap to reveal meaning';
    }
  }

  function formatMeaning(r) {
    let h = '';
    if (r.translation) h += `<div class="meaning-translation">↳ ${escapeHtml(r.translation)}</div>`;
    h += `<div class="meaning-text">${escapeHtml(r.meaning || r.error || '')}</div>`;
    return h;
  }

  function escapeHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  document.getElementById('songInput').addEventListener('keydown', e => { if (e.key === 'Enter') fetchLyrics(); });
</script>
</body>
</html>
